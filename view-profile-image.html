<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Image - Bello Jawad</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-window {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 120, 212, 0.15), 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 800px;
            overflow: hidden;
            animation: slideInUp 0.5s ease-out;
        }

        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Windows 11 Title Bar */
        .window-titlebar {
            background: rgba(240, 240, 240, 0.9);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            user-select: none;
        }

        .titlebar-content {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }

        .titlebar-text {
            font-size: 14px;
            font-weight: 500;
            color: #1f1f1f;
            letter-spacing: 0.3px;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 36px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #1f1f1f;
            font-size: 16px;
            border: none;
            background: transparent;
        }

        .control-btn:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .control-btn.close:hover {
            background: #c42b1c;
            color: white;
        }

        /* Content Area */
        .window-content {
            padding: 40px;
            text-align: center;
        }

        .image-container {
            margin: 30px 0;
            animation: fadeIn 0.8s ease-out 0.2s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .profile-image-large {
            max-width: 500px;
            width: 100%;
            height: auto;
            border-radius: 16px;
            box-shadow: 0 12px 48px rgba(0, 120, 212, 0.25);
            border: 4px solid rgba(0, 120, 212, 0.1);
            transition: all 0.3s ease;
        }

        .profile-image-large:hover {
            transform: scale(1.02);
            box-shadow: 0 16px 64px rgba(0, 120, 212, 0.35);
        }

        .image-title {
            font-size: 28px;
            font-weight: 600;
            color: #1f1f1f;
            margin-top: 24px;
            margin-bottom: 8px;
        }

        .image-subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 30px;
        }

        .back-button {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, #0078d4, #50e6ff);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 8px 20px rgba(0, 120, 212, 0.3);
        }

        .back-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(0, 120, 212, 0.4);
            text-decoration: none;
            color: white;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(240, 240, 240, 0.5);
            color: #666;
            font-size: 14px;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .window-content {
                padding: 24px;
            }

            .profile-image-large {
                max-width: 100%;
            }

            .image-title {
                font-size: 22px;
            }

            .image-subtitle {
                font-size: 14px;
            }

            .titlebar-text {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <!-- Main Application Window Container -->
    <div class="app-window">
        <!-- Windows 11 Title Bar -->
        <div class="window-titlebar">
            <div class="titlebar-content">
                <i class="bi bi-image"></i>
                <span class="titlebar-text">Profile Image</span>
            </div>
            <div class="window-controls">
                <button class="control-btn" title="Minimize">
                    <i class="bi bi-dash-lg"></i>
                </button>
                <button class="control-btn" title="Maximize">
                    <i class="bi bi-square"></i>
                </button>
                <button class="control-btn close" title="Close" onclick="history.back()">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <!-- Window Content -->
        <div class="window-content">
            <div class="image-container">
                <img src="image/mrjay2.jpeg" alt="Mr Jay - Profile Photo" class="profile-image-large" />
            </div>

            <h1 class="image-title">Mr Jay</h1>
            <p class="image-subtitle">Information Systems Student | Frontend Developer</p>
            
            <a href="about.html" class="back-button">
                <i class="bi bi-arrow-left"></i> Back to About
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2024 Bello Jawad. All rights reserved.</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
