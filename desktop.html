<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS Developer Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- Bootstrap 5 (utilities used for responsive show/hide) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous" />
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Mobile message: visible only on small screens (below lg) -->
    <div class="mobile-message d-lg-none">
        <div class="mobile-message__wrap d-flex align-items-center justify-content-center w-100 h-100">
            <div class="mobile-card text-center">
                <div class="mobile-card-icon mb-3">
                    <i class="bi bi-desktop fs-1"></i>
                </div>
                <h2 class="mobile-card-title mb-2">Desktop Experience Recommended</h2>
                <p class="mobile-card-text mb-3">This portfolio was designed to simulate a modern desktop operating system.<br><br>For the best experience, please view it on a laptop or desktop computer.<br><br>Thank you for visiting.</p>
            </div>
        </div>
    </div>

    <!-- Desktop interface: hidden on small screens, shown on lg and larger -->
    <div class="desktop d-none d-lg-block">
        
        <nav class="desktop-icons">
            <a href="about.html" class="icon-item">
                <i class="ri-user-line icon-blue"></i>
                <span>About Me</span>
            </a>
            <a href="project.html" class="icon-item">
                <i class="ri-folder-open-line icon-yellow"></i>
                <span>Projects</span>
            </a>
            <a href="skills.html" class="icon-item">
                <i class="ri-star-line icon-purple"></i>
                <span>Skills</span>
            </a>
            <a href="resume.html" class="icon-item">
                <i class="ri-file-text-line icon-green"></i>
                <span>Resume</span>
            </a>
            <a href="contact.html" class="icon-item">
                <i class="ri-mail-line icon-orange"></i>
                <span>Contact</span>
            </a>
        </nav>

    </div>

    <footer class="taskbar d-none d-lg-flex">
        <div class="taskbar-left">
            <button class="start-btn">
                <i class="ri-apps-2-fill"></i>
            </button>
            <div class="search-container">
                <i class="ri-search-line search-icon"></i>
                <input type="text" class="search-input" placeholder="Search" readonly>
            </div>
        </div>

        <div class="taskbar-right">
            <i class="ri-wifi-line"></i>
            <i class="ri-volume-up-line"></i>
            <i class="ri-battery-charge-line"></i>
            <div class="time-date">
                <span class="time">13:21</span>
                <span class="date">02/06</span>
            </div>
        </div>
    </footer>

</body>
</html>
