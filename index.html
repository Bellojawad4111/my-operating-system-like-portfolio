<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mr Jay | Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-..." crossorigin="anonymous" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.4/font/bootstrap-icons.css" rel="stylesheet" />
    <!-- <link rel="stylesheet" href="csss.css" /> -->
    <style>
      * {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
  margin: 0;
  padding: 0;
  scroll-behavior: smooth;
}

body {
  background: radial-gradient(circle at 10% 20%, rgba(124, 92, 255, 0.35), transparent 24%),
    radial-gradient(circle at 90% 10%, rgba(108, 122, 255, 0.22), transparent 22%),
    linear-gradient(180deg, #0b1127 0%, #050816 100%);
  overflow-x: hidden;
}

a {
  color: inherit;
}

a:hover,
a:focus {
  text-decoration: none;
}

.lockscreen {
  min-height: 100vh;
  background: linear-gradient(180deg, rgba(12, 18, 40, 0.9), rgba(3, 8, 22, 0.92)),
    url('https://images.unsplash.com/photo-1518770660439-4636190af475?auto=format&fit=crop&w=1400&q=80') center/cover no-repeat;
  position: relative;
}

.lockscreen::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top, rgba(255, 255, 255, 0.11), transparent 30%);
}

.lockscreen-card {
  max-width: 680px;
  border-radius: 32px;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.12);
  background: rgba(15, 23, 52, 0.68);
  box-shadow: 0 35px 90px rgba(0, 0, 0, 0.35);
}
.tap-hint {
  display: inline-flex;
  align-items: center;
  gap: 0.65rem;
  font-size: 1rem;
  letter-spacing: 0.04em;
  color: rgba(255, 255, 255, 0.75);
}

.lockscreen-link {
  position: absolute;
  inset: 0;
  z-index: 1;
}

.fade-in {
  animation: fadeInUp 1.2s ease forwards;
  opacity: 0;
}

.delay-1 {
  animation-delay: 0.4s;
}

@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(28px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

    </style>
  </head>
  <body>
    <a href="desktop.html" class="lockscreen-link" aria-label="Enter desktop"></a>

    <main class="lockscreen d-flex align-items-center justify-content-center text-center px-4">
      <div class="lockscreen-card glass-card py-5 px-4">
        <div class="fade-in delay-1">
          <h1 class="display-4 fw-bold mb-3">Bello Jawad</h1>
          <p class="text-secondary fs-5 mb-4">
            Information Systems Student<br />Frontend Developer<br />Future Full-Stack Engineer
          </p>
          <p class="lead mb-4">Welcome to my digital workspace.</p>
          <div class="tap-hint mt-4">
            <i class="bi bi-mouse2-fill me-2"></i>Tap anywhere to enter
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
