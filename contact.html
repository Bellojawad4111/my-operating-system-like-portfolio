<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Bello Jawad Portfolio</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.0/font/bootstrap-icons.min.css" rel="stylesheet">
    
    <!-- Internal Stylesheet -->
    <style>
        /* ============================================
           GLOBAL STYLES & ROOT VARIABLES
           ============================================ */
        :root {
            --primary-color: #0078d4;
            --secondary-color: #1f1f1f;
            --accent-color: #50e6ff;
            --glass-bg: rgba(255, 255, 255, 0.8);
            --glass-border: rgba(255, 255, 255, 0.2);
            --card-shadow: 0 8px 32px rgba(0, 120, 212, 0.15);
            --smooth-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        /* ============================================
           MAIN APPLICATION WINDOW CONTAINER
           ============================================ */
        .app-window {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        /* ============================================
           WINDOW TITLEBAR
           ============================================ */
        .window-titlebar {
            background: linear-gradient(to right, #f3f3f3, #ffffff);
            border-bottom: 1px solid #e0e0e0;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            user-select: none;
        }

        .titlebar-content {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--secondary-color);
            font-weight: 500;
        }

        .window-controls {
            display: flex;
            gap: 8px;
        }

        .control-btn {
            width: 36px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--secondary-color);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: var(--smooth-transition);
        }

        .control-btn:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .control-btn.close:hover {
            background: #e81123;
            color: white;
        }

        /* ============================================
           WINDOW CONTENT
           ============================================ */
        .window-content {
            flex: 1;
            overflow-y: auto;
            padding: 40px;
        }

        .window-content::-webkit-scrollbar {
            width: 8px;
        }

        .window-content::-webkit-scrollbar-track {
            background: transparent;
        }

        .window-content::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 4px;
        }

        .window-content::-webkit-scrollbar-thumb:hover {
            background: #999;
        }

        /* ============================================
           CONTACT HEADER
           ============================================ */
        .contact-header {
            text-align: center;
            margin-bottom: 50px;
        }

        .contact-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            box-shadow: 0 8px 24px rgba(0, 120, 212, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.8);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .contact-title {
            font-size: 32px;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 12px;
        }

        .contact-subtitle {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        /* ============================================
           SOCIAL MEDIA SECTION
           ============================================ */
        .social-section {
            margin-bottom: 50px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 30px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--primary-color);
            display: inline-block;
        }

        .social-links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .social-card {
            background: linear-gradient(135deg, rgba(0, 120, 212, 0.1), rgba(80, 230, 255, 0.1));
            border: 2px solid var(--glass-border);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            transition: var(--smooth-transition);
            cursor: pointer;
        }

        .social-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(0, 120, 212, 0.2);
            border-color: var(--primary-color);
        }

        .social-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .social-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 8px;
        }

        .social-link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            word-break: break-all;
            transition: var(--smooth-transition);
        }

        .social-link:hover {
            color: var(--accent-color);
            text-decoration: underline;
        }

        .social-card a {
            color: inherit;
        }

        /* LinkedIn Styling */
        .linkedin-card {
            border-left: 4px solid #0a66c2;
        }

        .linkedin-card .social-icon {
            color: #0a66c2;
        }

        /* WhatsApp Styling */
        .whatsapp-card {
            border-left: 4px solid #25d366;
        }

        .whatsapp-card .social-icon {
            color: #25d366;
        }

        /* X (Twitter) Styling */
        .twitter-card {
            border-left: 4px solid #000;
        }

        .twitter-card .social-icon {
            color: #000;
        }

        /* ============================================
           CONTACT FORM SECTION
           ============================================ */
        .form-section {
            background: rgba(0, 120, 212, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            font-weight: 600;
            color: var(--secondary-color);
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-control {
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 12px 16px;
            font-size: 14px;
            transition: var(--smooth-transition);
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(0, 120, 212, 0.1);
            outline: none;
        }

        .submit-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            padding: 14px 32px;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--smooth-transition);
            width: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 120, 212, 0.3);
        }

        /* ============================================
           FOOTER
           ============================================ */
        .footer {
            text-align: center;
            padding: 24px;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
            background: rgba(240, 240, 240, 0.5);
            color: #666;
            font-size: 14px;
        }

        /* ============================================
           RESPONSIVE DESIGN
           ============================================ */
        @media (max-width: 768px) {
            .window-content {
                padding: 24px;
            }

            .contact-title {
                font-size: 24px;
            }

            .contact-subtitle {
                font-size: 16px;
            }

            .section-title {
                font-size: 20px;
            }

            .social-links {
                grid-template-columns: 1fr;
            }

            .form-section {
                padding: 20px;
            }
        }

        @media (max-width: 480px) {
            .app-window {
                border-radius: 8px;
            }

            .window-content {
                padding: 16px;
            }

            .contact-icon {
                width: 80px;
                height: 80px;
                font-size: 40px;
            }

            .contact-title {
                font-size: 20px;
            }

            .contact-subtitle {
                font-size: 14px;
            }

            .section-title {
                font-size: 18px;
            }

            .social-card {
                padding: 16px;
            }

            .social-icon {
                font-size: 36px;
                margin-bottom: 12px;
            }

            .social-name {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- Main Application Window Container -->
    <div class="app-window">
        <!-- Windows 11 Title Bar -->
        <div class="window-titlebar">
            <div class="titlebar-content">
                <i class="bi bi-telephone"></i>
                <span class="titlebar-text">Contact Me</span>
            </div>
            <div class="window-controls">
                <button class="control-btn" title="Minimize">
                    <i class="bi bi-dash-lg"></i>
                </button>
                <button class="control-btn" title="Maximize">
                    <i class="bi bi-square"></i>
                </button>
                <button class="control-btn close" title="Close">
                    <i class="bi bi-x-lg"></i>
                </button>
            </div>
        </div>

        <!-- Window Content -->
        <div class="window-content">
            <!-- Contact Header -->
            <section class="contact-header">
                <div class="contact-icon">
                    <i class="bi bi-chat-dots"></i>
                </div>
                <h1 class="contact-title">Let's Connect</h1>
                <p class="contact-subtitle">Feel free to reach out through any of these channels</p>
            </section>

            <!-- Social Media Links Section -->
            <section class="social-section">
                <h2 class="section-title">📱 Connect With Me</h2>
                <div class="social-links">
                    <!-- LinkedIn Card -->
                    <a href="#" class="social-card linkedin-card">
                        <div class="social-icon">
                            <i class="bi bi-linkedin"></i>
                        </div>
                        <div class="social-name">LinkedIn</div>
                        <div class="social-link">Your LinkedIn URL</div>
                    </a>

                    <!-- WhatsApp Card -->
                    <a href="#" class="social-card whatsapp-card">
                        <div class="social-icon">
                            <i class="bi bi-whatsapp"></i>
                        </div>
                        <div class="social-name">WhatsApp</div>
                        <div class="social-link">Your WhatsApp Number</div>
                    </a>

                    <!-- X (Twitter) Card -->
                    <a href="#" class="social-card twitter-card">
                        <div class="social-icon">
                            <i class="bi bi-twitter-x"></i>
                        </div>
                        <div class="social-name">X</div>
                        <div class="social-link">Your X Profile</div>
                    </a>
                </div>
            </section>

            <!-- Contact Form Section -->
            <section class="form-section">
                <h2 class="section-title">✉️ Send a Message</h2>
                <form style="margin-top: 20px;">
                    <div class="form-group">
                        <label class="form-label">Your Name</label>
                        <input type="text" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Your Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Subject</label>
                        <input type="text" class="form-control" placeholder="What is this about?" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Message</label>
                        <textarea class="form-control" rows="5" placeholder="Your message here..." required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </section>
        </div>

        <!-- Footer -->
        <div class="footer">
            <p>&copy; 2026 Bello Jawad | All rights reserved</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
